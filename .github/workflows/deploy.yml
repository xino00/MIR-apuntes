name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: git clone --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Install Quartz dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Write Quartz config
        working-directory: /tmp/quartz
        run: |
          cat > quartz.config.ts << 'QUARTZEOF'
          import { QuartzConfig } from "./quartz/cfg"
          import * as Plugin from "./quartz/plugins"

          const config: QuartzConfig = {
            configuration: {
              pageTitle: "MIR · Apuntes",
              enableSPA: true,
              enablePopovers: true,
              analytics: null,
              locale: "es-ES",
              baseUrl: "xino00.github.io/MIR-apuntes",
              ignorePatterns: [".obsidian", "99_Plantillas", "gemini-scribe", "tmp"],
              defaultDateType: "modified",
              theme: {
                fontOrigin: "googleFonts",
                cdnCaching: true,
                typography: {
                  header: "Schibsted Grotesk",
                  body: "Source Sans Pro",
                  code: "IBM Plex Mono",
                },
                colors: {
                  lightMode: {
                    light: "#faf8f8",
                    lightgray: "#e5e5e5",
                    gray: "#b8b8b8",
                    darkgray: "#4e4e4e",
                    dark: "#2b2b2b",
                    secondary: "#284b63",
                    tertiary: "#84a59d",
                    highlight: "rgba(143, 159, 169, 0.15)",
                    textHighlight: "#fff23688",
                  },
                  darkMode: {
                    light: "#161618",
                    lightgray: "#393639",
                    gray: "#646464",
                    darkgray: "#d4d4d4",
                    dark: "#ebebec",
                    secondary: "#7b97aa",
                    tertiary: "#84a59d",
                    highlight: "rgba(143, 159, 169, 0.15)",
                    textHighlight: "#b3aa0288",
                  },
                },
              },
            },
            plugins: {
              transformers: [
                Plugin.FrontMatter(),
                Plugin.CreatedModifiedDate({ priority: ["frontmatter", "filesystem"] }),
                Plugin.SyntaxHighlighting({ theme: { light: "github-light", dark: "github-dark" }, keepBackground: false }),
                Plugin.ObsidianFlavoredMarkdown({ enableInHtmlEmbed: false }),
                Plugin.GitHubFlavoredMarkdown(),
                Plugin.TableOfContents(),
                Plugin.CrawlLinks({ markdownLinkResolution: "shortest" }),
                Plugin.Description(),
                Plugin.Latex({ renderEngine: "katex" }),
              ],
              filters: [Plugin.RemoveDrafts()],
              emitters: [
                Plugin.AliasRedirects(),
                Plugin.ComponentResources(),
                Plugin.ContentPage(),
                Plugin.FolderPage(),
                Plugin.TagPage(),
                Plugin.ContentIndex({ enableSiteMap: true, enableRSS: true }),
                Plugin.Assets(),
                Plugin.Static(),
                Plugin.NotFoundPage(),
              ],
            },
          }

          export default config
          QUARTZEOF

      - name: Copy vault content
        run: |
          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".obsidian" \
            --exclude=".agents" \
            --exclude="50_Guardias" \
            --exclude="40_Casos clinicos" \
            --exclude="99_Plantillas" \
            --exclude="gemini-scribe" \
            --exclude="tmp" \
            --exclude="sync.sh" \
            --exclude="CLAUDE.md" \
            --exclude="*.sh" \
            --exclude="Libros y referencias/*.pdf" \
            --exclude="Libros y referencias/*.txt" \
            . /tmp/quartz/content/

      - name: Build Quartz
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
