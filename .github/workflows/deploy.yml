name: Deploy Quartz to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Principle of least privilege: only request what's needed
permissions:
  contents: read  # Read repository code only

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Clone Quartz (pinned version)
        run: git clone --depth 1 --branch v4.5.2 https://github.com/jackyzha0/quartz.git quartz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: quartz/package-lock.json
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Cache Quartz build
        uses: actions/cache@v4
        with:
          path: quartz/.quartz-cache
          key: quartz-cache-${{ github.sha }}
          restore-keys: |
            quartz-cache-

      - name: Install Quartz dependencies
        working-directory: quartz
        run: npm ci

      - name: Apply Quartz config
        run: cp $GITHUB_WORKSPACE/.github/quartz.config.ts quartz/quartz.config.ts

      - name: Copy vault content
        run: |
          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".obsidian" \
            --exclude=".agents" \
            --exclude="gemini-scribe" \
            --exclude="tmp" \
            --exclude="sync.sh" \
            --exclude="CLAUDE.md" \
            --exclude="*.sh" \
            --exclude="quartz" \
            . quartz/content/

      - name: Set homepage
        run: cp quartz/content/90_MOCs/000_INICIO.md quartz/content/index.md

      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Copy static files to public
        run: |
          cp $GITHUB_WORKSPACE/.github/_headers quartz/public/_headers
          cp $GITHUB_WORKSPACE/.github/robots.txt quartz/public/robots.txt

      - name: Validate build output and report metrics
        run: |
          if [ ! -d "quartz/public" ]; then
            echo "❌ Build failed: no output directory created"
            exit 1
          fi

          HTML_COUNT=$(find quartz/public -type f -name '*.html' | wc -l)
          if [ "$HTML_COUNT" -eq 0 ]; then
            echo "❌ Build failed: no HTML files generated"
            exit 1
          fi

          # Calcular tamaño total
          TOTAL_SIZE=$(du -sh quartz/public | cut -f1)

          # Contar assets
          CSS_COUNT=$(find quartz/public -type f -name '*.css' | wc -l)
          JS_COUNT=$(find quartz/public -type f -name '*.js' | wc -l)
          IMAGE_COUNT=$(find quartz/public -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.gif' -o -name '*.svg' \) | wc -l)

          echo "✅ Build validated!"
          echo "📊 Build metrics:"
          echo "  • HTML files: $HTML_COUNT"
          echo "  • CSS files: $CSS_COUNT"
          echo "  • JavaScript files: $JS_COUNT"
          echo "  • Images: $IMAGE_COUNT"
          echo "  • Total size: $TOTAL_SIZE"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy quartz/public --project-name=mirapuntes --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
