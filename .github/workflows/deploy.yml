name: Deploy Quartz to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Clone Quartz
        run: git clone --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Install Quartz dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Apply Quartz config
        run: cp $GITHUB_WORKSPACE/.github/quartz.config.ts /tmp/quartz/quartz.config.ts

      - name: Copy vault content
        run: |
          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".obsidian" \
            --exclude=".agents" \
            --exclude="gemini-scribe" \
            --exclude="tmp" \
            --exclude="sync.sh" \
            --exclude="CLAUDE.md" \
            --exclude="*.sh" \
            . /tmp/quartz/content/

      - name: Set homepage
        run: cp /tmp/quartz/content/90_MOCs/000_INICIO.md /tmp/quartz/content/index.md

      - name: Build Quartz
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: /tmp/quartz/public
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
