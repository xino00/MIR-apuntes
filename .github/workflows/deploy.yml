name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Clone Quartz
        run: git clone --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Install Quartz dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Apply Quartz config
        run: cp $GITHUB_WORKSPACE/.github/quartz.config.ts /tmp/quartz/quartz.config.ts

      - name: Copy vault content
        run: |
          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".obsidian" \
            --exclude=".agents" \
            --exclude="gemini-scribe" \
            --exclude="tmp" \
            --exclude="sync.sh" \
            --exclude="CLAUDE.md" \
            --exclude="*.sh" \
            . /tmp/quartz/content/

      - name: Set homepage
        run: cp /tmp/quartz/content/90_MOCs/000_INICIO.md /tmp/quartz/content/index.md

      - name: Build Quartz
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
